<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expenses — HisabKitab</title>
    <link rel="stylesheet" href="./static/css/style.css">
    <script src="./static/js/script.js" defer></script>
</head>
<body onload="requireLogin(); loadExpenses();">
<header class="site-header">
    <a href="index.html" class="header-logo">
        <div class="header-logo-icon">HK</div>
        <span class="header-logo-text">HisabKitab</span>
    </a>
    <nav class="header-nav">
        <span id="headerUser" class="header-user"></span>
        <div id="authButtons"></div>
    </nav>
</header>

<main class="main-content">
    <div class="container">
        <div class="greeting">💸 Daily Expense Tracker</div>
        <h1 class="page-title">Add Expense</h1>
        <p class="page-subtitle">Log your personal spending below.</p>

        <form id="expenseForm" class="expense-form">
            <div class="form-group">
                <label class="form-label">Expense Title</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-group">
                <label class="form-label">Amount (₹)</label>
                <input type="number" id="amount" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select id="category" required>
                    <option value="">Select a category</option>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Date</label>
                <input type="date" id="date" required>
            </div>
            <button type="submit" class="btn">Add Expense</button>
        </form>

        <div id="message"></div>
        <hr class="divider">

        <div class="section-title">Your Expenses</div>
        <div id="expenseTableContainer"></div>

        <div class="button-group">
            <a href="dashboard.html" class="btn secondary-btn">← Back to Dashboard</a>
        </div>
    </div>
</main>

<footer class="site-footer">
    <p>&copy; 2025 <strong>HisabKitab</strong> — Kharcha likho, hisaab clear karo.</p>
</footer>

<script>
document.getElementById("expenseForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = localStorage.getItem("username");

    const payload = {
        username,
        title: document.getElementById("title").value,
        amount: document.getElementById("amount").value,
        category: document.getElementById("category").value,
        date: document.getElementById("date").value
    };

    const res = await fetch(`${API_BASE}/api/add-expense`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.success) {
        document.getElementById("message").innerHTML = `<div class="success-message">${data.message}</div>`;
        document.getElementById("expenseForm").reset();
        loadExpenses();
    } else {
        document.getElementById("message").innerHTML = `<div class="error-message">${data.message}</div>`;
    }
});

async function loadExpenses() {
    const username = localStorage.getItem("username");
    const res = await fetch(`${API_BASE}/api/expenses/${username}`);
    const data = await res.json();

    const container = document.getElementById("expenseTableContainer");

    if (!data.expenses || data.expenses.length === 0) {
        container.innerHTML = `<div class="empty-state">No expenses added yet.</div>`;
        return;
    }

    let rows = data.expenses.map(expense => `
        <tr>
            <td style="text-align:left;font-weight:600;">${expense.title}</td>
            <td>₹${expense.amount}</td>
            <td>${expense.category}</td>
            <td>${expense.date}</td>
            <td>
                <button class="small-btn danger-small-btn" onclick="deleteExpense('${expense._id}')">Delete</button>
            </td>
        </tr>
    `).join("");

    container.innerHTML = `
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
        <div class="total-row">
            <span>Total Kharcha:</span>
            <span>₹${data.total_amount}</span>
        </div>
    `;
}

async function deleteExpense(expenseId) {
    const username = localStorage.getItem("username");

    if (!confirm("Delete this expense?")) return;

    const res = await fetch(`${API_BASE}/api/delete-expense/${expenseId}/${username}`, {
        method: "DELETE"
    });

    const data = await res.json();

    if (data.success) {
        loadExpenses();
    } else {
        alert(data.message);
    }
}
</script>
</body>
</html>
