<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — HisabKitab</title>
    <link rel="stylesheet" href="./static/css/style.css">
    <script src="./static/js/script.js" defer></script>
</head>
<body>
<header class="site-header">
    <a href="index.html" class="header-logo">
        <div class="header-logo-icon">HK</div>
        <span class="header-logo-text">HisabKitab</span>
    </a>
    <nav class="header-nav">
        <span id="headerUser" class="header-user"></span>
        <div id="authButtons"></div>
    </nav>
</header>

<main class="main-content">
    <div class="container-narrow">
        <h1 class="page-title" style="text-align:center;">Login</h1>
        <p class="page-subtitle" style="text-align:center;">Log in to see your expenses and trips.</p>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn" style="width:100%;">Login</button>
        </form>

        <div id="message"></div>

        <p class="bottom-text">
            Don't have an account? <a href="signup.html">Signup here</a>
        </p>
    </div>
</main>

<footer class="site-footer">
    <p>&copy; 2025 <strong>HisabKitab</strong> — Kharcha likho, hisaab clear karo.</p>
</footer>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const payload = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
    };

    const res = await fetch(`${API_BASE}/api/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });

    const data = await res.json();
    const messageDiv = document.getElementById("message");

    if (data.success) {
        localStorage.setItem("name", data.name);
        localStorage.setItem("username", data.username);
        window.location.href = "dashboard.html";
    } else {
        messageDiv.innerHTML = `<div class="error-message">${data.message}</div>`;
    }
});
</script>
</body>
</html>
