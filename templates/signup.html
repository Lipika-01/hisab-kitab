{% extends "base.html" %}
{% block title %}Signup — HisabKitab{% endblock %}
{% block content %}
<div class="container-narrow">
    <div style="text-align:center;margin-bottom:28px;">
        <div class="hero-badge">New here?</div>
        <h1 class="page-title" style="text-align:center;">Create Account</h1>
        <p style="font-size:14px;color:var(--text-light);margin:0;">Join HisabKitab and start splitting expenses fairly.</p>
    </div>
    <form method="POST">
        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Lipika Bag" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Pick a unique username" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
        </div>
        <button type="submit" class="btn" style="width:100%;margin-top:6px;">Create Account</button>
    </form>
    {% if message %}
        <div class="error-message">⚠ {{ message }}</div>
    {% endif %}
    <p class="bottom-text">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </p>
</div>
{% endblock %}
