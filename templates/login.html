{% extends "base.html" %}
{% block title %}Login — HisabKitab{% endblock %}
{% block content %}
<div class="container-narrow">
    <div style="text-align:center;margin-bottom:28px;">
        <div class="hero-badge">Welcome back!</div>
        <h1 class="page-title" style="text-align:center;">Login</h1>
        <p style="font-size:14px;color:var(--text-light);margin:0;">Log in to see your expenses and trips.</p>
    </div>
    <form method="POST">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn" style="width:100%;margin-top:6px;">Login</button>
    </form>
    {% if message %}
        <div class="error-message">⚠ {{ message }}</div>
    {% endif %}
    <p class="bottom-text">
        Don't have an account? <a href="{{ url_for('signup') }}">Signup here</a>
    </p>
</div>
{% endblock %}
